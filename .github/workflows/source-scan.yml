name: Invicti Source Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  source-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Invicti registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login registry.invicti.com -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Create output directory
        run: mkdir -p ${{ github.workspace }}/output

      - name: Run Invicti Source Scan
        env:
          INVICTI_URL: ${{ secrets.INVICTI_URL }}
          INVICTI_USER: ${{ secrets.INVICTI_USER }}
          INVICTI_TOKEN: ${{ secrets.INVICTI_TOKEN }}
        run: |
          docker run --rm \
            -e INVICTI_URL="${INVICTI_URL}" \
            -e INVICTI_USER="${INVICTI_USER}" \
            -e INVICTI_TOKEN="${INVICTI_TOKEN}" \
            -v "${{ github.workspace }}:/code:ro" \
            -v "${{ github.workspace }}/output:/output" \
            registry.invicti.com/invicti-platform/invicti-source-scan:latest \
            /code

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ github.workspace }}/output/results.sarif
